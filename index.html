<!DOCTYPE html>
<html lang="id">
<head>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Untuk compile JSX di browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #05050a; 
            color: #e2e8f0; 
            margin: 0;
            overflow-x: hidden;
        }
        /* Sembunyikan Scrollbar Horizontal tapi tetap bisa di-scroll */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animasi standar Tailwind */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .fade-in { animation: fadeIn 0.7s ease-out forwards; }
        .slide-in-from-bottom-4 { animation: slideInUp 0.7s ease-out forwards; }
        .slide-in-from-right-8 { animation: slideInRight 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ICONS (Lucide Icons Inline SVGs pengganti import modul) ---

            ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2 0 5 1 7 2a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
            ChevronLeft: '<path d="m15 18-6-6 6-6"/>',

            Sparkles: '<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M19 17v4"/><path d="M17 19h4"/>',

        const Download = (p) => <Icon name="Download" {...p} />;
        const Star = (p) => <Icon name="Star" {...p} />;
        const ShieldCheck = (p) => <Icon name="ShieldCheck" {...p} />;
        const ChevronLeft = (p) => <Icon name="ChevronLeft" {...p} />;
        const Menu = (p) => <Icon name="Menu" {...p} />;
        const Monitor = (p) => <Icon name="Monitor" {...p} />;
        const Smartphone = (p) => <Icon name="Smartphone" {...p} />;
        const Clock = (p) => <Icon name="Clock" {...p} />;
        const LayoutGrid = (p) => <Icon name="LayoutGrid" {...p} />;
        const Gamepad2 = (p) => <Icon name="Gamepad2" {...p} />;
        const User = (p) => <Icon name="User" {...p} />;
        const Info = (p) => <Icon name="Info" {...p} />;
        const ShieldAlert = (p) => <Icon name="ShieldAlert" {...p} />;
        const Sparkles = (p) => <Icon name="Sparkles" {...p} />;
        const HardDrive = (p) => <Icon name="HardDrive" {...p} />;
        const LinkIcon = (p) => <Icon name="LinkIcon" {...p} />;
        const Share2 = (p) => <Icon name="Share2" {...p} />;

        // --- MOCK DATA ---

        const MOCK_APPS = [
            {
                id: '1', title: 'FreeReels', developer: 'SKYWORK AI PTE.LTD.', version: '2.3.60', size: '65,83 MB', rating: 4.4, downloads: '100jt+',

                icon: "https://raw.githubusercontent.com/dhikzzzgalaxy/Dhikzzz-Galaxy/main/Logo/FreeReels.png",

                features: ['Premium Unlocked', 'No ADS', 'All Episodes unlocked', ' Remove Screenshot Restriction',  'Remove Google Play Store Updates' 'Remove Google Play Services'],
                mirrors: [{ name: "Versi 2.3.60", url: "https://www.mediafire.com/file/74r8l7mpzyqwgqb/FreeReels_2.3.60_%2528200360001%2529_Release_Dhikzzz_Galaxy.apk/file", size: '65,83 MB' }]
            },
            {
                id: '2', title: 'Spotify: Music & Podcasts', developer: 'Spotify AB', version: 'v8.9.10', size: '45 MB', rating: 4.8, downloads: '50M+',
                androidMin: 'Android 5.0+', updatedAt: '1 Minggu Lalu', category: 'Streaming', isPremium: true, isTrending: true,
                icon: 'https://images.unsplash.com/photo-1614680376593-902f74cf0d41?auto=format&fit=crop&q=80&w=200&h=200',
                banner: 'https://images.unsplash.com/photo-1614680376408-16e340b4bcbd?auto=format&fit=crop&q=80&w=1200&h=400',

                features: ['Spotify Connect Unlocked', 'No Ads (Audio & Visual)', 'Unlimited Skips', 'Extreme Audio Quality Unlocked'],
                mirrors: [{ name: 'MediaFire', url: '#', size: '45 MB' }, { name: 'Dropbox', url: '#', size: '45 MB' }]
            },
            {
                id: '3', title: 'Genshin Impact', developer: 'HoYoverse', version: 'v4.5.0', size: '350 MB (APK)', rating: 4.7, downloads: '10M+',
                androidMin: 'Android 7.0+', updatedAt: 'Kemarin', category: 'RPG', isPremium: false, isTrending: true,
                icon: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=200&h=200',
                banner: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=1200&h=400',
                description: 'Masuki Teyvat, dunia fantasi yang luas yang penuh dengan kehidupan dan mengalir dengan energi elemen. Mod ini berfokus pada optimasi grafis dan bypass limit FPS (Hanya untuk perangkat Root/Virtual).',
                features: ['FPS Unlocker (60/120 FPS)', 'Graphics Optimizer', 'Anti-Ban (Gunakan Resiko Sendiri)'],
                mirrors: [{ name: 'Google Drive', url: '#', size: '350 MB' }]
            },
            {
                id: '4', title: 'Canva: Design, Photo & Video', developer: 'Canva', version: 'v2.240.0', size: '38 MB', rating: 4.9, downloads: '25M+',
                androidMin: 'Android 6.0+', updatedAt: '3 Hari Lalu', category: 'Productivity', isPremium: true, isTrending: false,
                icon: 'https://images.unsplash.com/photo-1626785774573-4b799315345d?auto=format&fit=crop&q=80&w=200&h=200',
                banner: 'https://images.unsplash.com/photo-1626785774625-ddc1e4cb8f86?auto=format&fit=crop&q=80&w=1200&h=400',
                description: 'Canva adalah alat desain grafis, editor foto, dan editor video gratis. Buat postingan media sosial, video, kartu, pamflet, kolase foto & lainnya. Pro Mod membuka ribuan template dan aset premium.',
                features: ['Pro Features Unlocked', 'Premium Templates Available', 'Magic Resize Unlocked', 'Background Remover Unlocked'],
                mirrors: [{ name: 'Mega', url: '#', size: '38 MB' }, { name: 'MediaFire', url: '#', size: '38 MB' }]
            }
        ];

        // --- COMPONENTS ---
        const Badge = ({ children, variant = 'primary' }) => {
            const styles = {
                primary: "bg-cyan-500/10 text-cyan-400 border-cyan-500/20",
                premium: "bg-purple-500/10 text-purple-400 border-purple-500/20 shadow-[0_0_10px_rgba(188,19,254,0.2)]",
                success: "bg-emerald-500/10 text-emerald-400 border-emerald-500/20"
            };
            return <span className={`px-2 py-1 text-[10px] font-bold uppercase tracking-wider rounded-md border ${styles[variant]} backdrop-blur-sm`}>{children}</span>;
        };

        const AppCard = ({ app, onClick }) => (
            <div onClick={() => onClick(app)} className="group relative bg-white/[0.02] border border-white/[0.05] hover:border-cyan-500/40 rounded-2xl p-4 cursor-pointer transition-all duration-500 overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-cyan-500/5 to-purple-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500" />
                {app.isPremium && <div className="absolute top-3 right-3 z-10"><Badge variant="premium">Premium</Badge></div>}
                <div className="relative z-10 flex items-start gap-4">
                    <div className="relative w-16 h-16 rounded-xl overflow-hidden shrink-0 group-hover:scale-105 transition-transform duration-500 shadow-lg">
                        <img src={app.icon} alt={app.title} className="w-full h-full object-cover" />
                    </div>
                    <div className="flex-1 min-w-0">
                        <h3 className="font-bold text-slate-100 truncate group-hover:text-cyan-400 transition-colors">{app.title}</h3>
                        <p className="text-xs text-slate-400 truncate mt-0.5">{app.developer}</p>
                        <div className="flex items-center gap-3 mt-3 text-xs text-slate-300">
                            <span className="flex items-center gap-1"><Star size={12} className="text-yellow-400 fill-yellow-400" /> {app.rating}</span>
                            <span className="flex items-center gap-1 text-slate-500">•</span>
                            <span className="flex items-center gap-1"><Download size={12} className="text-cyan-400" /> {app.size}</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- VIEWS ---
        const HomeView = ({ onAppSelect, searchQuery, setSearchQuery }) => {
            const filteredApps = useMemo(() => {
                if (!searchQuery) return MOCK_APPS;
                return MOCK_APPS.filter(app => app.title.toLowerCase().includes(searchQuery.toLowerCase()) || app.category.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [searchQuery]);
            const trendingApps = filteredApps.filter(a => a.isTrending);

            return (
                <div className="fade-in slide-in-from-bottom-4 duration-700 pb-24">
                    <section className="relative pt-32 pb-20 px-4 md:px-8 max-w-7xl mx-auto flex flex-col items-center text-center">

                        </div>
                        <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight text-slate-100 mb-6 leading-tight">

                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 drop-shadow-[0_0_15px_rgba(0,243,255,0.4)]">Dhikzzz Galaxy</span>

                        <div className="relative w-full max-w-2xl group">
                            <div className="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-2xl blur opacity-25 group-hover:opacity-40 transition duration-500"></div>
                            <div className="relative flex items-center bg-[#0a0a0f] border border-white/10 rounded-2xl px-4 py-3 backdrop-blur-xl">

                                <input type="text" placeholder="Cari game, aplikasi, atau kategori..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-transparent border-none outline-none text-slate-100 placeholder-slate-500 text-lg" />
                                <button className="hidden sm:flex px-6 py-2 bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-400 hover:to-purple-500 text-white font-semibold rounded-xl transition-all shadow-[0_0_15px_rgba(0,243,255,0.3)]">Jelajahi</button>
                            </div>
                        </div>
                    </section>

                    <div className="max-w-7xl mx-auto px-4 md:px-8 space-y-16">
                        <section>
                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-2xl font-bold text-slate-100 flex items-center gap-2"><LayoutGrid className="text-cyan-400" /> Kategori Populer</h2>
                            </div>
                            <div className="flex gap-3 overflow-x-auto pb-4 scrollbar-hide -mx-4 px-4 md:mx-0 md:px-0">
                                {CATEGORIES.map((cat, i) => (
                                    <button key={i} onClick={() => setSearchQuery(cat)} className="whitespace-nowrap px-5 py-2.5 rounded-xl bg-white/[0.03] border border-white/[0.05] hover:bg-white/[0.08] hover:border-cyan-500/30 text-slate-300 hover:text-cyan-400 transition-all font-medium">
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </section>

                        {trendingApps.length > 0 && (
                            <section>
                                <h2 className="text-2xl font-bold text-slate-100 mb-6 flex items-center gap-2">🔥 Sedang Tren (Trending)</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                                    {trendingApps.map(app => <AppCard key={app.id} app={app} onClick={onAppSelect} />)}
                                </div>
                            </section>
                        )}

                        <section>
                            <h2 className="text-2xl font-bold text-slate-100 mb-6 flex items-center gap-2"><Gamepad2 className="text-purple-400" /> Semua Aplikasi</h2>
                            {filteredApps.length === 0 ? (
                                <div className="text-center py-20 bg-white/[0.02] border border-white/[0.05] rounded-3xl"><p className="text-slate-400 text-lg">Tidak ada aplikasi yang ditemukan untuk "{searchQuery}"</p></div>

                            <div className="flex flex-col md:flex-row gap-6 md:gap-8 relative z-10">
                                <div className="shrink-0"><img src={app.icon} alt={app.title} className="w-32 h-32 md:w-40 md:h-40 rounded-3xl shadow-[0_0_30px_rgba(0,0,0,0.5)] border border-white/10" /></div>
                                <div className="flex-1 flex flex-col justify-center">
                                    <div className="flex flex-wrap items-center gap-2 mb-3">
                                        <Badge variant="primary">{app.category}</Badge>
                                        {app.isPremium && <Badge variant="premium">Premium Unlocked</Badge>}
                                        <Badge variant="success">Updated</Badge>
                                    </div>
                                    <h1 className="text-3xl md:text-4xl font-bold text-slate-100 mb-2">{app.title}</h1>
                                    <p className="text-cyan-400 font-medium mb-6 text-lg">{app.developer}</p>
                                    <div className="grid grid-cols-2 md:flex md:flex-wrap gap-4 md:gap-8 text-sm">
                                        <div><p className="text-slate-500 mb-1 flex items-center gap-1"><Monitor size={14}/> Versi</p><p className="font-semibold text-slate-200">{app.version}</p></div>
                                        <div><p className="text-slate-500 mb-1 flex items-center gap-1"><HardDrive size={14}/> Ukuran</p><p className="font-semibold text-slate-200">{app.size}</p></div>
                                        <div><p className="text-slate-500 mb-1 flex items-center gap-1"><Star size={14}/> Rating</p><p className="font-semibold text-slate-200">{app.rating} / 5.0</p></div>
                                        <div><p className="text-slate-500 mb-1 flex items-center gap-1"><Clock size={14}/> Diperbarui</p><p className="font-semibold text-slate-200">{app.updatedAt}</p></div>
                                        <div className="col-span-2 md:col-span-1"><p className="text-slate-500 mb-1 flex items-center gap-1"><Smartphone size={14}/> Sistem</p><p className="font-semibold text-slate-200">{app.androidMin}</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-8">

                                <div className="bg-white/[0.02] border border-white/[0.05] rounded-3xl p-6 md:p-8">
                                    <h3 className="text-xl font-bold text-slate-100 mb-4 flex items-center gap-2"><Info className="text-cyan-400" /> Deskripsi</h3>
                                    <p className="text-slate-300 leading-relaxed">{app.description}</p>
                                </div>
                                <div className="bg-white/[0.02] border border-white/[0.05] rounded-3xl p-6 md:p-8">

                                                <Download size={20} className="text-slate-600 group-hover:text-cyan-400 transition-colors" />

                                    </div>
                                </div>
                                <button onClick={() => alert("Link berhasil disalin!")} className="w-full py-4 rounded-2xl bg-white/[0.03] border border-white/10 text-slate-300 font-semibold flex items-center justify-center gap-2 hover:bg-white/[0.08] transition-colors">
                                    <Share2 size={18} /> Bagikan Aplikasi
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [currentView, setCurrentView] = useState('home');
            const [selectedApp, setSelectedApp] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const navigateToDetail = (app) => { setSelectedApp(app); setCurrentView('detail'); };
            const navigateToHome = () => { setSelectedApp(null); setCurrentView('home'); };

            return (
                <div className="min-h-screen bg-[#05050a] text-slate-200 font-sans selection:bg-cyan-500/30 overflow-x-hidden">
                    <div className="fixed inset-0 pointer-events-none z-0 opacity-40">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-900/20 blur-[150px] rounded-full mix-blend-screen" />
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-900/20 blur-[150px] rounded-full mix-blend-screen" />
                    </div>

                    <nav className="fixed top-0 w-full z-50 bg-[#05050a]/60 backdrop-blur-xl border-b border-white/[0.05] shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
                        <div className="max-w-7xl mx-auto px-4 md:px-8">
                            <div className="flex items-center justify-between h-20">

                                        <img src="https://raw.githubusercontent.com/dhikzzzgalaxy/Dhikzzz-Galaxy/main/Logo_Dhikzzz_Galaxy.png" alt="Dhikzzz Galaxy Logo" className="w-full h-full object-contain p-1" />
                                    </div>
                                    <span className="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-slate-400 group-hover:text-white transition-colors">Dhikzzz Galaxy</span>
                                </div>
                                <div className="hidden md:flex items-center gap-8 text-sm font-medium text-slate-400">
                                    <button onClick={navigateToHome} className={`${currentView === 'home' ? 'text-cyan-400' : 'hover:text-slate-100'} transition-colors`}>Home</button>
                                    <button className="hover:text-slate-100 transition-colors">Apps</button>
                                    <button className="hover:text-slate-100 transition-colors">Games</button>
                                    <button className="hover:text-slate-100 transition-colors">Request</button>
                                </div>
                                <div className="flex items-center gap-4">
                                    <button className="hidden md:flex items-center gap-2 text-sm font-medium text-slate-300 bg-white/5 hover:bg-white/10 px-4 py-2 rounded-full border border-white/10 transition-colors"><User size={16} /> Login</button>
                                    <button className="md:hidden p-2 text-slate-400 hover:text-white" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}><Menu size={24} /></button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="relative z-10">
                        {currentView === 'home' && <HomeView onAppSelect={navigateToDetail} searchQuery={searchQuery} setSearchQuery={setSearchQuery} />}
                        {currentView === 'detail' && selectedApp && <AppDetailView app={selectedApp} onBack={navigateToHome} />}
                    </main>

                    <footer className="relative z-10 border-t border-white/[0.05] bg-black/40 backdrop-blur-md pt-16 pb-8">
                        <div className="max-w-7xl mx-auto px-4 md:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-3">
                                {/* Menerapkan Logo Baru di Footer */}
                                <div className="w-8 h-8 rounded-lg overflow-hidden bg-white flex items-center justify-center opacity-90 border border-white/20">
                                    <img src="https://raw.githubusercontent.com/dhikzzzgalaxy/Dhikzzz-Galaxy/main/Logo_Dhikzzz_Galaxy.png" alt="Dhikzzz Galaxy Logo" className="w-full h-full object-contain p-0.5" />
                                </div>
                                <span className="font-bold text-slate-300">Dhikzzz Galaxy</span>
                            </div>
                            <p className="text-slate-500 text-sm text-center md:text-left">© 2026 Dhikzzz Galaxy</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
